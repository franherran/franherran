<svg fill="none" viewBox="0 0 800 320" width="800" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .container {
          font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
          background: #0d1117;
          color: #e6edf3;
          height: 320px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow: hidden;
        }
        .grid {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image:
            linear-gradient(rgba(0,68,129,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,68,129,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
        }
        .glow {
          position: absolute;
          width: 300px;
          height: 300px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(0,68,129,0.12) 0%, transparent 70%);
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          animation: pulse 4s ease-in-out infinite;
        }
        .content {
          position: relative;
          z-index: 1;
          text-align: center;
        }
        .greeting {
          font-size: 14px;
          color: #004481;
          letter-spacing: 4px;
          text-transform: uppercase;
          font-weight: 500;
          animation: fadeIn 0.8s ease-out;
          margin-bottom: 12px;
        }
        .name {
          font-size: 42px;
          font-weight: 700;
          color: #ffffff;
          letter-spacing: -1px;
          animation: fadeIn 0.8s ease-out 0.2s both;
          margin-bottom: 16px;
        }
        .role {
          font-size: 16px;
          color: #8b949e;
          font-weight: 400;
          animation: fadeIn 0.8s ease-out 0.4s both;
          margin-bottom: 24px;
        }
        .role .highlight {
          color: #004481;
          font-weight: 500;
        }
        .line {
          width: 60px;
          height: 2px;
          background: linear-gradient(90deg, transparent, #004481, transparent);
          margin: 0 auto 20px;
          animation: fadeIn 0.8s ease-out 0.6s both;
        }
        .tags {
          display: flex;
          gap: 8px;
          justify-content: center;
          animation: fadeIn 0.8s ease-out 0.8s both;
        }
        .tag {
          font-family: 'Courier New', monospace;
          font-size: 12px;
          color: #004481;
          background: rgba(0,68,129,0.08);
          border: 1px solid rgba(0,68,129,0.15);
          padding: 4px 12px;
          border-radius: 4px;
          letter-spacing: 1px;
        }
      </style>
      <div class="container">
        <div class="grid"></div>
        <div class="glow"></div>
        <div class="content">
          <div class="greeting">Hello World</div>
          <div class="name">Francisco Herrán</div>
          <div class="role">Full Stack Developer · Co-Founder at <span class="highlight">Alher Tech</span></div>
          <div class="line"></div>
          <div class="tags">
            <span class="tag">React</span>
            <span class="tag">Next.js</span>
            <span class="tag">Spring Boot</span>
            <span class="tag">TypeScript</span>
            <span class="tag">AWS</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
